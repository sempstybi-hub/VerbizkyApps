<!DOCTYPE html>
<html lang="ru">
<head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="css/materialize.min.css" media="screen,projection"/>
    <link type="text/css" rel="stylesheet" href="css/style.css" media="screen,projection"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
        <nav>
            <div class="nav-wrapper teal">
                <a href="index.html" class="brand-logo" style="margin-left: 10px;">Мои проги / ПРОГРАММЫ</a>
                <ul id="nav-mobile" class="right hide-on-med-and-down">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="project.html">Программы</a></li>
                    <li><a href="">Предложения</a></li>
                    <li><a href="">Загрузка</a></li>
                </ul>
            </div>
        </nav>

        <div class="container">
            <div class="input-field">
                <i class="material-icons prefix white-text">search</i>
                <input id="search-input" type="text" class="validate">
                <label for="search-input">Поиск</label>
            </div>

            <!-- индикатор загрузки -->
            <div id="preloader" class="preloader-wrapper big active">
                <div class="spinner-layer">
                    <div class="circle-clipper left">
                        <div class="circle"></div>
                    </div>
                    <div class="gap-patch">
                        <div class="circle"></div>
                    </div>
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>

            <!-- грид со всеми программами -->
            <div id="projects-grid" class="row"></div>
        </div>

        <script type="text/javascript" src="js/materialize.min.js"></script>
        <script>
            let allProjects = [];

            // Функция для отображения статуса проекта
            function getStatusIcon(status) {
                switch(status) {
                    case 'ready':
                        return '<i class="material-icons status-ready">check</i>';
                    case 'development':
                        return '<i class="material-icons status-dev">code</i>';
                    case 'abandoned':
                        return '<i class="material-icons status-abandoned">do_not_disturb_alt</i>';
                    default:
                        return '';
                }
            }

            // Функция для отображения карточек
            function displayProjects(projects) {
                const grid = document.getElementById('projects-grid');
                grid.innerHTML = '';
                
                if (projects.length === 0) {
                    grid.innerHTML = '<div class="center-align" style="margin-top: 50px;"><h5>Ничего не найдено</h5></div>';
                    return;
                }
                
                projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'col s12 m6 l3';
                    card.innerHTML = `
                        <div class="card">
                            <div class="card-image">
                                <img src="${project.image || 'img/default.png'}" alt="${project.name}">
                                <a class="btn-floating halfway-fab waves-effect waves-light teal" href="${project.downloadLink || '#'}" download>
                                    <i class="material-icons">file_download</i>
                                </a>
                            </div>
                            <div class="card-content">
                                <p><strong>${project.name}</strong> - ${project.version || '1.0'}</p>
                                <p class="truncate">${project.description || 'Описание отсутствует'}</p>
                                <div class="card-status">
                                    ${getStatusIcon(project.status)}
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                // Инициализируем Materialize компоненты для новых карточек
                if (window.M) {
                    M.AutoInit();
                }
            }

            // Функция поиска
            function searchProjects() {
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const filtered = allProjects.filter(project => 
                    project.name.toLowerCase().includes(searchTerm) ||
                    (project.description && project.description.toLowerCase().includes(searchTerm))
                );
                displayProjects(filtered);
            }

            // Загрузка данных из JSON
            async function loadProjects() {
                const preloader = document.getElementById('preloader');
                const grid = document.getElementById('projects-grid');
                
                try {
                    // Показываем прелоадер
                    preloader.classList.remove('hidden');
                    grid.innerHTML = '';
                    
                    // Загружаем данные
                    const response = await fetch('db/app.json');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    allProjects = data.projects || data; // поддерживаем разные структуры JSON
                    
                    // Скрываем прелоадер
                    preloader.classList.add('hidden');
                    
                    // Отображаем проекты
                    displayProjects(allProjects);
                    
                } catch (error) {
                    console.error('Ошибка загрузки проектов:', error);
                    preloader.classList.add('hidden');
                    grid.innerHTML = `
                        <div class="center-align" style="margin-top: 50px;">
                            <h5 class="red-text">Ошибка загрузки данных</h5>
                            <p>Проверьте файл db/app.json</p>
                        </div>
                    `;
                }
            }

            // Добавляем обработчик поиска
            document.getElementById('search-input').addEventListener('input', searchProjects);
            
            // Загружаем проекты при загрузке страницы
            document.addEventListener('DOMContentLoaded', loadProjects);
        </script>
    </body>
</html>
